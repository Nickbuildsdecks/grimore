version: '3.8'

services:
  app:
    build: .
    container_name: grimore-app
    restart: always
    expose:
      - "3000"
    volumes:
      - ./data:/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MOXFIELD_USER_AGENT=${MOXFIELD_USER_AGENT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - POSTGRES_URL=postgres://grimore_user:grimore_password_99@postgres:5432/grimore_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: grimore-postgres
    restart: always
    environment:
      POSTGRES_USER: grimore_user
      POSTGRES_PASSWORD: grimore_password_99
      POSTGRES_DB: grimore_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: grimore-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: grimore-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VM_IP=${VM_IP}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
