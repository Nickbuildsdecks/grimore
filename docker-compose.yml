version: '3.8'

services:
  app:
    build: .
    container_name: grimore-app
    restart: always
    expose:
      - "3000"
    volumes:
      - ./data:/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MOXFIELD_USER_AGENT=${MOXFIELD_USER_AGENT}

  caddy:
    image: caddy:2-alpine
    container_name: grimore-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
