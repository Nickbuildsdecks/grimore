<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8860b" />
      <stop offset="100%" stop-color="#ffdf00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Minimalist Ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#logo-grad)" stroke-width="3.5" />
  
  <!-- Stylized Hourglass / Aether node -->
  <path d="M32 28 L68 28 L50 50 Z" fill="url(#logo-grad)" opacity="0.15" />
  <path d="M32 72 L68 72 L50 50 Z" fill="url(#logo-grad)" opacity="0.15" />
  
  <!-- Intersecting pairing nodes -->
  <path d="M32 28 L68 72" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" />
  <path d="M68 28 L32 72" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" />
  
  <!-- Center Core Link -->
  <circle cx="50" cy="50" r="7" fill="url(#accent-grad)" filter="url(#glow)" />
  <circle cx="50" cy="50" r="3" fill="#ffffff" />
</svg>
